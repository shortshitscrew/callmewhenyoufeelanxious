<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Take My Hand 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      transition: background 2.5s ease;
      background: radial-gradient(ellipse at 60% 0%, #0c1e3a 0%, #050d1a 55%, #020810 100%);
      cursor: default;
      user-select: none;
    }

    body.golden {
      background: radial-gradient(ellipse at 50% 0%, #ff9a3c 0%, #ffcf77 30%, #ffe4a0 60%, #ffd6a5 100%);
    }

    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      transition: opacity 2s ease;
    }
    body.golden #stars { opacity: 0; }

    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.1; } 50% { opacity: 0.9; }
    }

    .moon {
      position: fixed; top: 40px; right: 60px;
      width: 60px; height: 60px; border-radius: 50%;
      background: transparent;
      box-shadow: -16px 16px 0 3px #fefcd7;
      filter: drop-shadow(0 0 16px rgba(254,252,215,0.5));
      pointer-events: none; z-index: 2;
      transition: opacity 2s ease;
    }
    body.golden .moon { opacity: 0; }

    .sun {
      position: fixed; top: 50px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, #ffe566, #ffb347);
      box-shadow: 0 0 60px 20px rgba(255,180,50,0.5);
      opacity: 0; pointer-events: none; z-index: 2;
      transition: opacity 2.5s ease;
    }
    body.golden .sun { opacity: 1; }

    .ground {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px;
      background: linear-gradient(to top, #1a3a1a, #2d5a2d);
      z-index: 1; transition: background 2.5s ease;
    }
    body.golden .ground {
      background: linear-gradient(to top, #5a3a1a, #8b6914);
    }

    /* ── Scene ── */
    .scene {
      position: relative; z-index: 10;
      width: 100vw; max-width: 600px; height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }

    /* Both figures use same SVG viewBox 60x280, same CSS width */
    .figure { width: 70px; }

    .character {
      position: absolute;
      bottom: 100px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Girl — dead center */
    .girl {
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    /* Guy — starts fully off screen left */
    .guy {
      left: 50%;
      transform: translateX(-600%);
      z-index: 19;
      transition: transform 1.4s cubic-bezier(0.34, 1.1, 0.64, 1);
    }
    .guy.arrived {
      transform: translateX(-148%);
    }

    .girl { cursor: pointer; }

    .hand-hint {
      position: absolute;
      bottom: 310px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.85rem;
      color: rgba(254,252,215,0.65);
      pointer-events: none; z-index: 30;
      animation: hintPulse 2s ease-in-out infinite;
      white-space: nowrap; transition: opacity 1s ease;
    }
    .hand-hint.hidden { opacity: 0; }
    @keyframes hintPulse {
      0%,100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50%      { opacity: 1;   transform: translateX(-50%) translateY(-5px); }
    }

    /* Petals */
    .petal {
      position: fixed; top: -30px;
      pointer-events: none; z-index: 50;
      animation: petalFall linear forwards;
    }
    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(110vh) rotate(600deg) translateX(var(--sway)); }
    }

    /* Glow */
    .glow-ring {
      position: fixed; pointer-events: none; z-index: 15;
      border-radius: 50%; width: 70px; height: 70px;
      background: radial-gradient(circle, rgba(255,220,100,0.55), transparent);
      bottom: 128px; left: 50%; transform: translateX(-60%);
      opacity: 0; transition: opacity 1.5s ease;
    }
    .glow-ring.visible { opacity: 1; }

    /* Message */
    .message-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 60; pointer-events: none;
      opacity: 0; transition: opacity 1s ease;
    }
    .message-wrap.visible { opacity: 1; pointer-events: all; }

    .message-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 24px; padding: 2rem 2.5rem;
      max-width: 340px; width: 88vw; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      transform: translateY(20px);
      transition: transform 1s ease;
    }
    .message-wrap.visible .message-card { transform: translateY(0); }

    .msg-icon {
      font-size: 2.2rem; display: block; margin-bottom: 0.7rem;
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14% { transform: scale(1.2); }
      42% { transform: scale(1.1); }
    }

    .message-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 600; color: #7a3030; margin-bottom: 0.6rem;
    }
    .message-card p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1rem; color: #5a2020; line-height: 1.7;
    }
    .close-hint {
      margin-top: 1rem; font-size: 0.72rem;
      color: rgba(90,32,32,0.45); letter-spacing: 1px; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="stars"></div>
  <div class="moon"></div>
  <div class="sun"></div>
  <div class="ground"></div>
  <div class="glow-ring" id="glowRing"></div>
  <div class="hand-hint" id="hint">✦ tap her to call him ✦</div>

  <div class="scene">

    <!-- ══ GUY — slim, tall, same viewBox as girl ══ -->
    <div class="character guy" id="guy" onclick="triggerDisconnect()" style="cursor:pointer;">
      <!--
        ViewBox: 60 wide × 280 tall
        Head top ~y=10, feet ~y=275
        Slim: shoulders ~18px wide, hips ~14px wide
        He faces RIGHT (toward girl), his RIGHT hand reaches toward her (right side of SVG)
      -->
      <svg class="figure" viewBox="0 0 60 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Shadow -->
        <ellipse cx="30" cy="274" rx="14" ry="4" fill="rgba(0,0,0,0.18)"/>
        <!-- Left leg -->
        <rect x="23" y="190" width="7" height="82" rx="3.5" fill="#2c3e6b"/>
        <!-- Right leg -->
        <rect x="32" y="190" width="7" height="82" rx="3.5" fill="#253462"/>
        <!-- Left shoe -->
        <ellipse cx="26" cy="272" rx="8" ry="3.5" fill="#1a1a2e"/>
        <!-- Right shoe -->
        <ellipse cx="36" cy="272" rx="8" ry="3.5" fill="#1a1a2e"/>
        <!-- Torso — slim -->
        <rect x="21" y="110" width="18" height="84" rx="6" fill="#3b5088"/>
        <!-- Belt -->
        <rect x="21" y="185" width="18" height="4" rx="2" fill="#1a2a50"/>
        <!-- Collar V -->
        <path d="M27 110 L30 122 L33 110" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
        <!-- Left arm — hangs down slightly -->
        <rect x="13" y="112" width="7" height="52" rx="3.5" fill="#3b5088" transform="rotate(6 13 112)"/>
        <!-- Left hand -->
        <ellipse cx="11" cy="165" rx="4.5" ry="5" fill="#f0b88a" transform="rotate(6 11 165)"/>
        <!-- Right arm — reaches toward girl (right side) -->
        <rect x="40" y="112" width="7" height="58" rx="3.5" fill="#3b5088" transform="rotate(-10 40 112)"/>
        <!-- Right hand reaching -->
        <ellipse cx="49" cy="172" rx="4.5" ry="5.5" fill="#f0b88a" transform="rotate(-10 49 172)"/>
        <!-- Neck -->
        <rect x="27" y="92" width="7" height="20" rx="3.5" fill="#f0b88a"/>
        <!-- Head — slightly smaller (guy slightly taller) -->
        <ellipse cx="30" cy="72" rx="16" ry="18" fill="#f0b88a"/>
        <!-- Hair — short dark -->
        <ellipse cx="30" cy="57" rx="16" ry="9" fill="#2c1a0e"/>
        <rect x="14" y="55" width="32" height="12" rx="6" fill="#2c1a0e"/>
        <!-- Side hair -->
        <rect x="14" y="60" width="5" height="14" rx="2.5" fill="#2c1a0e"/>
        <rect x="41" y="60" width="5" height="12" rx="2.5" fill="#2c1a0e"/>
        <!-- Eyes — facing right slightly -->
        <ellipse cx="25" cy="72" rx="2.2" ry="2.5" fill="#2c1a0e"/>
        <ellipse cx="35" cy="72" rx="2.2" ry="2.5" fill="#2c1a0e"/>
        <circle cx="25.8" cy="71.2" r="0.8" fill="white"/>
        <circle cx="35.8" cy="71.2" r="0.8" fill="white"/>
        <!-- Eyebrows -->
        <path d="M22 68 Q25 66.5 28 68" stroke="#2c1a0e" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M32 68 Q35 66.5 38 68" stroke="#2c1a0e" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Smile -->
        <path d="M25 79 Q30 84 35 79" stroke="#c07050" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- ══ GIRL — slim, tall, same viewBox ══ -->
    <div class="character girl" id="girl" onclick="triggerConnection()">
      <!--
        ViewBox: 60 wide × 280 tall
        Same height proportion as guy
        She faces LEFT (toward guy), her LEFT hand reaches toward him (left side of SVG)
      -->
      <svg class="figure" viewBox="0 0 60 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dg" x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0%" stop-color="#f9c8d4" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#d06080" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <!-- Shadow -->
        <ellipse cx="30" cy="274" rx="13" ry="4" fill="rgba(0,0,0,0.18)"/>
        <!-- Dress — slim A-line -->
        <path d="M22 138 Q16 200 18 274 L42 274 Q44 200 38 138 Z" fill="#f4a7b9"/>
        <path d="M22 138 Q16 200 18 274 L42 274 Q44 200 38 138 Z" fill="url(#dg)"/>
        <!-- Dress shimmer -->
        <path d="M28 138 Q26 200 26 274 L32 274 Q32 200 30 138Z" fill="rgba(255,255,255,0.12)"/>
        <!-- Dress waist -->
        <ellipse cx="30" cy="138" rx="9" ry="3" fill="#e07a96" opacity="0.4"/>
        <!-- Torso — slim -->
        <rect x="22" y="108" width="16" height="34" rx="6" fill="#f4a7b9"/>
        <!-- Right arm — hangs slightly (away from guy, right side) -->
        <rect x="39" y="110" width="6" height="50" rx="3" fill="#f5c5a3" transform="rotate(-6 39 110)"/>
        <!-- Right hand -->
        <ellipse cx="46" cy="162" rx="4" ry="4.8" fill="#f5c5a3" transform="rotate(-6 46 162)"/>
        <!-- Left arm — reaches toward guy (left side) TAP TARGET AREA -->
        <rect x="15" y="110" width="6" height="54" rx="3" fill="#f5c5a3" transform="rotate(8 15 110)" id="girlArm"/>
        <!-- Left hand — TAP HERE -->
        <ellipse cx="11" cy="166" rx="4.5" ry="5.2" fill="#f5c5a3" transform="rotate(8 11 166)" id="girlHand"/>
        <!-- Neck -->
        <rect x="27" y="90" width="7" height="20" rx="3.5" fill="#f5c5a3"/>
        <!-- Head -->
        <ellipse cx="30" cy="70" rx="16" ry="18" fill="#f5c5a3"/>
        <!-- Hair back layer -->
        <path d="M14 65 Q6 120 14 190 Q18 130 22 115 Z" fill="#3d1f0e"/>
        <path d="M46 65 Q54 120 46 190 Q42 130 38 115 Z" fill="#3d1f0e"/>
        <!-- Hair top -->
        <ellipse cx="30" cy="55" rx="17" ry="10" fill="#3d1f0e"/>
        <rect x="13" y="52" width="34" height="16" rx="8" fill="#3d1f0e"/>
        <!-- Hair side strands -->
        <path d="M13 68 Q8 100 12 140 Q15 100 18 88Z" fill="#3d1f0e"/>
        <!-- Eyes — facing left -->
        <ellipse cx="24" cy="70" rx="2.2" ry="2.5" fill="#2c1a0e"/>
        <ellipse cx="34" cy="70" rx="2.2" ry="2.5" fill="#2c1a0e"/>
        <circle cx="24.8" cy="69.2" r="0.8" fill="white"/>
        <circle cx="34.8" cy="69.2" r="0.8" fill="white"/>
        <!-- Eyelashes (upper) -->
        <line x1="21.5" y1="67.5" x2="20" y2="65" stroke="#2c1a0e" stroke-width="0.9"/>
        <line x1="24" y1="67" x2="23" y2="64.5" stroke="#2c1a0e" stroke-width="0.9"/>
        <line x1="26.5" y1="67.5" x2="26" y2="65" stroke="#2c1a0e" stroke-width="0.9"/>
        <!-- Blush -->
        <ellipse cx="20" cy="75" rx="5" ry="2.5" fill="#f4a7b9" opacity="0.45"/>
        <ellipse cx="40" cy="75" rx="5" ry="2.5" fill="#f4a7b9" opacity="0.45"/>
        <!-- Smile -->
        <path d="M24 78 Q30 84 36 78" stroke="#c0826a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Hair pin -->
        <circle cx="42" cy="54" r="3.5" fill="#f4a7b9"/>
        <circle cx="42" cy="54" r="1.8" fill="#e07a96"/>
      </svg>
    </div>

  </div>

  <!-- Message -->
  <div class="message-wrap" id="messageWrap" onclick="this.classList.remove('visible')">
    <div class="message-card">
      <span class="msg-icon">🌸</span>
      <h2>I've got you.</h2>
      <p>Wherever you go, whatever you feel — I just want to be the one walking beside you. No rush. Just us.</p>
      <p class="close-hint">tap anywhere to continue</p>
    </div>
  </div>

  <script>
    let connected = false;

    function triggerConnection() {
      if (connected) return;
      connected = true;

      document.getElementById('hint').classList.add('hidden');
      document.getElementById('guy').classList.add('arrived');

      setTimeout(() => {
        document.body.classList.add('golden');
        document.getElementById('glowRing').classList.add('visible');
        startPetals();
        setTimeout(() => {
          document.getElementById('messageWrap').classList.add('visible');
        }, 1400);
      }, 1100);
    }

    function triggerDisconnect() {
      if (!connected) return;
      connected = false;

      // Hide message & glow
      document.getElementById('messageWrap').classList.remove('visible');
      document.getElementById('glowRing').classList.remove('visible');

      // Slide guy away
      document.getElementById('guy').classList.remove('arrived');

      // Revert to night
      setTimeout(() => {
        document.body.classList.remove('golden');
        document.getElementById('hint').classList.remove('hidden');
      }, 600);
    }

    function startPetals() {
      const emojis = ['🌸','🌷','🌺','✿','❀','🌼'];
      let count = 0;
      const burst = setInterval(() => {
        spawnPetal(emojis[Math.floor(Math.random()*emojis.length)]);
        if (++count > 55) clearInterval(burst);
      }, 110);
      setTimeout(() => {
        setInterval(() => spawnPetal(emojis[Math.floor(Math.random()*emojis.length)]), 700);
      }, 7000);
    }

    function spawnPetal(emoji) {
      const p = document.createElement('span');
      p.className = 'petal';
      p.textContent = emoji;
      const dur = 4 + Math.random() * 4;
      p.style.cssText = `
        left:${10+Math.random()*80}vw;
        font-size:${0.7+Math.random()*0.7}rem;
        animation-duration:${dur}s;
        animation-delay:${Math.random()*0.8}s;
        --sway:${(Math.random()-0.5)*180}px;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur+1.5)*1000);
    }

    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random()*2+0.4;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
